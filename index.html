/* ================= CLIENT-EDITABLE: BRAND (colors + type) ========= */
:root{
  --accent:#c1742d;        /* saffron amber — prices, active states     */
  --accent-deep:#a15e1e;
  --accent-soft:#f3e4cf;   /* amber tint for chips/badges               */
  --good:#3f7d5a;          /* available / vegetarian (mint-tea green)   */
  --star:#e0a52e;

  --font-body:'Manrope', system-ui, -apple-system, Segoe UI, sans-serif;
  --font-display:'Cormorant Garamond', Georgia, 'Times New Roman', serif;

  --r-sm:10px; --r:16px; --r-lg:22px; --r-pill:999px;
  --maxw:860px;
  /* motion tokens - strong curves + a small duration scale */
  --ease-out:cubic-bezier(0.23,1,0.32,1);       /* entrances / reveals */
  --ease-in-out:cubic-bezier(0.77,0,0.175,1);   /* on-screen movement  */
  --dur-press:150ms; --dur-hover:200ms; --dur-reveal:560ms;
  --shadow:0 1px 2px rgba(58,42,31,.05), 0 12px 30px -16px rgba(58,42,31,.22);
  --shadow-sm:0 1px 2px rgba(58,42,31,.06), 0 6px 16px -12px rgba(58,42,31,.24);

  /* semantic tokens — LIGHT */
  --bg:#f6efe3; --bg-2:#f1e8d8; --surface:#fffcf5; --surface-2:#f7efe0;
  --ink:#3a2a1f; --muted:#8a7360; --line:#e8dcc8; --line-strong:#dccbb0;
  --header-bg:rgba(246,239,227,.86);
}
@media (prefers-color-scheme:dark){
  :root{--bg:#1b1510; --bg-2:#221a13; --surface:#241c15; --surface-2:#2c2318;
    --ink:#f1e7d7; --muted:#b3a08a; --line:#3a2e20; --line-strong:#4a3b28;
    --header-bg:rgba(27,21,16,.86);
    --accent-soft:#3a2c1a; --shadow:0 1px 2px rgba(0,0,0,.4),0 16px 34px -18px rgba(0,0,0,.7);
    --shadow-sm:0 1px 2px rgba(0,0,0,.4),0 8px 18px -12px rgba(0,0,0,.6);}
}
:root[data-theme="dark"]{--bg:#1b1510; --bg-2:#221a13; --surface:#241c15; --surface-2:#2c2318;
  --ink:#f1e7d7; --muted:#b3a08a; --line:#3a2e20; --line-strong:#4a3b28;
  --header-bg:rgba(27,21,16,.86);
  --accent-soft:#3a2c1a; --shadow:0 1px 2px rgba(0,0,0,.4),0 16px 34px -18px rgba(0,0,0,.7);
  --shadow-sm:0 1px 2px rgba(0,0,0,.4),0 8px 18px -12px rgba(0,0,0,.6);}
:root[data-theme="light"]{--bg:#f6efe3; --bg-2:#f1e8d8; --surface:#fffcf5; --surface-2:#f7efe0;
  --ink:#3a2a1f; --muted:#8a7360; --line:#e8dcc8; --line-strong:#dccbb0;
  --header-bg:rgba(246,239,227,.86); --accent-soft:#f3e4cf;
  --shadow:0 1px 2px rgba(58,42,31,.05),0 12px 30px -16px rgba(58,42,31,.22);
  --shadow-sm:0 1px 2px rgba(58,42,31,.06),0 6px 16px -12px rgba(58,42,31,.24);}

/* right-to-left (Arabic) uses Cairo for everything */
html[dir="rtl"] body,html[dir="rtl"] .display{--font-display:'Cairo',sans-serif}
html[dir="rtl"] body{font-family:'Cairo','Manrope',system-ui,sans-serif}

/* ============================ BASE ============================ */
*,*::before,*::after{box-sizing:border-box}
html{scroll-behavior:smooth}
@media (prefers-reduced-motion:reduce){html{scroll-behavior:auto}}
body{margin:0;background:var(--bg);color:var(--ink);
  font-family:var(--font-body);font-size:16px;line-height:1.6;
  -webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility}

.intro{position:relative;overflow:hidden}

.intro::before{content:"";position:absolute;z-index:0;top:-30%;inset-inline-end:-10%;

.steamfx{position:absolute;top:-18px;inset-inline-start:2px;display:flex;gap:7px;pointer-events:none}
.steamfx i{width:5px;height:26px;border-radius:6px;filter:blur(2px);opacity:0;

  animation:steam 3.4s ease-in-out infinite}
.steamfx i:nth-child(2){animation-delay:.8s;height:32px}

/* --- menu cards reveal as they scroll into view (JS-driven, interruptible) --- */
.item{opacity:0;transform:translateY(18px) scale(.985);overflow:hidden;
  transition:opacity var(--dur-reveal) var(--ease-out),transform var(--dur-reveal) var(--ease-out)}

/* after the reveal, hand transform back to the snappy hover/press timing */
.item.done{transition:transform var(--dur-hover) var(--ease-out),box-shadow .2s,border-color .2s}
/* accent edge grows on hover + price nudges */
.item::before{content:"";position:absolute;inset-block:0;inset-inline-start:0;width:3px;
  background:var(--accent);transform:scaleY(0);transform-origin:50% 0;transition:transform .3s var(--ease-out)}
.item:hover::before{transform:scaleY(1)}

/* --- category chips: active gets a lift --- */
.chip[aria-current="true"]{transform:translateY(-1px);box-shadow:0 6px 16px -8px var(--accent)}

/* --- open-status dot pulses --- */
.status-pill.open .d{animation:pulseDot 2.2s ease-out infinite}
@keyframes pulseDot{

/* --- search field subtle lift on focus --- */
.search input{transition:border-color .2s,box-shadow .2s,transform var(--dur-press) var(--ease-out)}
.search input:focus{transform:translateY(-1px)}

/* --- press feedback: tactile scale on tap (this is a phone-first QR menu) --- */
.act,.chip,.iconbtn,.langs button,.socials a,.totop,.item{-webkit-tap-highlight-color:transparent}
.iconbtn{transition:background .2s,color .2s,border-color .2s,transform var(--dur-press) var(--ease-out)}

}

const DAYS = {
  fr:["Dimanche","Lundi","Mardi","Mercredi","Jeudi","Vendredi","Samedi"],
  en:["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"],

};
const LANG_LABEL = { fr:"FR", en:"EN", ar:"AR", es:"ES" };

/* ===================== engine (no need to edit) ===================== */
const DEFAULT_LANG = SITE.languages[0];
let lang = localStorage.getItem('menu-lang');
if(!SITE.languages.includes(lang)) lang = DEFAULT_LANG;

const t = (obj)=> obj ? (obj[lang] || obj[DEFAULT_LANG] || '') : '';
const ui = (key)=> t(UI[key]);
const money = (p)=> SITE.currencyPosition==='before' ? SITE.currency+p : p+' '+SITE.currency;
const norm = (s)=> (s||'').toLowerCase().normalize('NFD').replace(/[̀-ͯ]/g,'');

/* ---- language switcher buttons ---- */
function buildLangs(){
  const box=document.getElementById('langs');
  box.innerHTML = SITE.languages.map(l=>
    `<button type="button" data-lang="${l}" aria-pressed="${l===lang}">${LANG_LABEL[l]||l.toUpperCase()}</button>`).join('');
  box.querySelectorAll('button').forEach(b=>b.addEventListener('click',()=>setLang(b.dataset.lang)));
}
function setLang(l){
  lang=l; localStorage.setItem('menu-lang',l);
  document.documentElement.lang=l;
  document.documentElement.dir = (l==='ar') ? 'rtl' : 'ltr';
  document.getElementById('langs').querySelectorAll('button')
    .forEach(b=>b.setAttribute('aria-pressed', b.dataset.lang===l));
  render();
}

/* ---- menu + everything text ---- */
function tagHtml(key){
  const tg=SITE.tags[key]; if(!tg) return '';
  const cls = tg.style==='veg'?'tag veg':tg.style==='hot'?'tag hot':'tag';
  return `<span class="${cls}">${t(tg)}</span>`;
}
function itemHtml(it){
  const out = it.available===false;
  const availTxt = out ? ui('unavailable') : ui('available');
  return `<article class="item ${out?'out':''}" data-name="${norm(t(it.name))}" data-desc="${norm(t(it.desc))}">
    <div class="item-top">
      <span class="name">${t(it.name)}</span>
      <span class="dots"></span>
      <span class="price">${money(it.price)}</span>
    </div>
    <p class="desc">${t(it.desc)}</p>
    <div class="item-meta">
      ${(it.tags||[]).map(tagHtml).join('')}
      <span class="avail ${out?'no':''}"><span class="d"></span>${availTxt}</span>
    </div>
  </article>`;
}
function render(){
  // static text
  document.getElementById('brandName').textContent = SITE.name;
  document.getElementById('introName').textContent = SITE.name;
  document.getElementById('footName').textContent = SITE.name;
  document.getElementById('brandMark').textContent = SITE.markInitials;
  document.getElementById('footMark').textContent = SITE.markInitials;
  document.getElementById('welcome').textContent = t(SITE.welcome);
  document.getElementById('orderNote').textContent = ui('orderNote');
  document.getElementById('searchInput').placeholder = ui('searchPh');
  document.getElementById('noResultsText').textContent = ui('noResults');
  document.getElementById('reviewTitle').textContent = ui('reviewTitle');
  document.getElementById('reviewText').textContent = ui('reviewText');
  document.querySelectorAll('[data-i18n]').forEach(el=>{ el.textContent = ui(el.dataset.i18n); });

  // links
  document.getElementById('directionsBtn').href = SITE.mapsUrl;
  document.getElementById('callBtn').href = 'tel:'+SITE.phoneDial;
  document.getElementById('reviewBtn').href = SITE.reviewUrl;
  document.getElementById('footAddr').href = SITE.mapsUrl;
  document.getElementById('footAddrText').textContent = t(SITE.address);
  document.getElementById('footPhone').href = 'tel:'+SITE.phoneDial;
  document.getElementById('footPhoneText').textContent = SITE.phone;

  // chips + sections
  const chips=document.getElementById('chips'); chips.innerHTML='';
  const root=document.getElementById('menuRoot'); root.innerHTML='';
  SITE.categories.forEach((c,i)=>{
    const chip=document.createElement('button');
    chip.className='chip'; chip.type='button'; chip.textContent=t(c.name);
    chip.setAttribute('data-target',c.id); chip.setAttribute('aria-current', i===0?'true':'false');
    chip.addEventListener('click',()=>{
      const el=document.getElementById('cat-'+c.id);
      const off=document.querySelector('.header').offsetHeight
              + document.querySelector('.subbar').offsetHeight + 10;
      const y=el.getBoundingClientRect().top+window.scrollY-off;
      window.scrollTo({top:y,behavior:'smooth'});
    });
    chips.appendChild(chip);

    const sec=document.createElement('section');
    sec.className='cat'; sec.id='cat-'+c.id;
    sec.innerHTML=`<div class="cat-head"><h2>${t(c.name)}</h2>
      <span class="count">${c.items.length} ${ui('itemCount')}</span></div>
      ${c.note?`<p class="cat-note">${t(c.note)}</p>`:''}
      <div class="hr"></div>
      <div class="items">${c.items.map(itemHtml).join('')}</div>`;
    root.appendChild(sec);
  });

  // hours + status + copyright
  buildHours();
  buildSocials();
  document.getElementById('copyText').textContent =
    `© ${new Date().getFullYear()} ${SITE.name}`;

  applySearch();
  observeSections();
  revealCards();
}

function parseOpen(){
  const now=new Date(); const today=now.getDay();
  const range=SITE.hours[today]; if(!range) return false;
  const m=range.match(/(\d{1,2}):(\d{2}).*?(\d{1,2}):(\d{2})/); if(!m) return false;
  const cur=now.getHours()*60+now.getMinutes();
  let start=+m[1]*60+ +m[2], end=+m[3]*60+ +m[4];
  if(end<=start) end+=1440; // crosses midnight
  return cur>=start && cur<=end;
}
function renderStatus(){
  const open=parseOpen();

}

}

/* ---- live search ---- */
function applySearch(){
  const q=norm(document.getElementById('searchInput').value.trim());
  document.getElementById('searchClear').classList.toggle('show', q.length>0);
  let anyGlobal=false;
  document.querySelectorAll('.cat').forEach(sec=>{
    let any=false;
    sec.querySelectorAll('.item').forEach(it=>{
      const hit = !q || it.dataset.name.includes(q) || it.dataset.desc.includes(q);
      it.style.display = hit?'':'none';
      if(hit) any=true;
    });
    sec.style.display = any?'':'none';
    if(any) anyGlobal=true;
  });
  document.getElementById('noResults').classList.toggle('show', !anyGlobal);
}

/* ---- scrollspy: highlight active category chip ---- */
let spy;
function observeSections(){
  if(spy) spy.disconnect();
  spy=new IntersectionObserver((ents)=>{
    ents.forEach(e=>{
      if(e.isIntersecting){
        const id=e.target.id.replace('cat-','');
        document.querySelectorAll('.chip').forEach(c=>
          c.setAttribute('aria-current', c.dataset.target===id));
        // keep active chip in view
        const active=document.querySelector('.chip[aria-current="true"]');
        if(active) active.scrollIntoView({block:'nearest',inline:'center'});
      }
    });
  },{rootMargin:'-186px 0px -60% 0px'});
  document.querySelectorAll('.cat').forEach(s=>spy.observe(s));
}

/* ---- reveal menu cards as they enter the viewport (staggered, interruptible) ---- */
let revealObs;
function revealCards(){
  const cards=document.querySelectorAll('.item');
  // reduced motion: show everything immediately, no movement
  if(matchMedia('(prefers-reduced-motion:reduce)').matches){
    cards.forEach(c=>c.classList.add('in','done')); return;
  }
  if(revealObs) revealObs.disconnect();
  revealObs=new IntersectionObserver((ents,obs)=>{
    ents.forEach(e=>{
      if(!e.isIntersecting) return;
      const el=e.target, grid=el.parentElement;
      const idx=Math.max(0,[].indexOf.call(grid.children,el));
      el.style.transitionDelay=Math.min(idx,6)*45+'ms';          // cap the stagger
      el.addEventListener('transitionend',function te(){          // then restore snappy timing
        el.style.transitionDelay=''; el.classList.add('done');
        el.removeEventListener('transitionend',te);
      });
      requestAnimationFrame(()=>el.classList.add('in'));
      obs.unobserve(el);
    });
  },{rootMargin:'0px 0px -6% 0px',threshold:.06});
  cards.forEach(c=>revealObs.observe(c));
}

/* ---- theme toggle ---- */
(function(){
  const root=document.documentElement, key='menu-theme';
  const saved=localStorage.getItem(key); if(saved) root.setAttribute('data-theme',saved);
  const sync=()=>{
    const dark = root.getAttribute('data-theme')==='dark' ||
      (!root.getAttribute('data-theme') && matchMedia('(prefers-color-scheme:dark)').matches);
    root.querySelector('#themeToggle .sun').style.display = dark?'none':'block';
    root.querySelector('#themeToggle .moon').style.display = dark?'block':'none';
  };
  document.getElementById('themeToggle').addEventListener('click',()=>{
    const cur=root.getAttribute('data-theme');
    const dark = cur? cur==='dark' : matchMedia('(prefers-color-scheme:dark)').matches;
    const next=dark?'light':'dark';
    root.setAttribute('data-theme',next); localStorage.setItem(key,next); sync();
  });
  matchMedia('(prefers-color-scheme:dark)').addEventListener('change',sync);
  window.__syncTheme=sync;
})();

(function(){
  const top=document.getElementById('toTop');
  const bar=document.getElementById('scrollbar');
  const onScroll=()=>{
    const y=window.scrollY;
    top.classList.toggle('show', y>700);
    const max=document.documentElement.scrollHeight-window.innerHeight;
    bar.style.transform='scaleX('+(max>0?Math.min(y/max,1):0)+')';
  };
  addEventListener('scroll',onScroll,{passive:true});
  addEventListener('resize',onScroll,{passive:true});onScroll();
  top.addEventListener('click',()=>window.scrollTo({top:0,behavior:'smooth'}));
})();
